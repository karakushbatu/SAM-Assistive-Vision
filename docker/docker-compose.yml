# ============================================================
# SAM Assistive Vision — Docker Compose
# ============================================================
# Usage:
#   docker compose -f docker/docker-compose.yml up --build
#
# GPU note:
#   The 'deploy' section below is ALREADY configured for NVIDIA GPU.
#   It will be silently ignored if no GPU is available on the host,
#   so this file works for both CPU (Phase 1-3) and GPU (Phase 4+).
#   For GPU support, install NVIDIA Container Toolkit first:
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
# ============================================================

version: "3.9"

services:

  # ----------------------------------------------------------
  # FastAPI Backend
  # ----------------------------------------------------------
  api:
    build:
      context: ..          # Project root (one level up from /docker)
      dockerfile: docker/Dockerfile
    container_name: sam_assistive_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MOCK_STT=false
      - MODEL_DEVICE=auto
      - MOCK_SAM=false
      - MOCK_BLIP=false
      - MOCK_OLLAMA=false
      - MOCK_TTS=false
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - OLLAMA_NUM_CTX=512
      - STT_MODEL=small
      - STT_COMPUTE_TYPE=auto
      - STT_MAX_AUDIO_SECONDS=8
      - MAX_FRAME_SIZE=640
      - MAX_WS_FRAME_BYTES=10485760
      - SAM_MAX_CROPS=3
      - BLIP_MAX_CAPTIONS=3
      - BLIP_MAX_NEW_TOKENS=32
      - OLLAMA_NUM_PREDICT=80
      - TTS_STREAMING=true
      - DEBUG=true
    volumes:
      # Hot-reload: mount source code so changes reflect without rebuild
      # Remove this in production
      - ..:/app
    networks:
      - assistive_net
    # GPU passthrough — requires NVIDIA Container Toolkit on host
    # Works on Linux hosts; on Windows use WSL2 with NVIDIA drivers
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Wait for the API to become healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ----------------------------------------------------------
  # Ollama LLM Server (Phase 4 — comment out if not needed yet)
  # ----------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: sam_assistive_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama   # Persist downloaded models
    networks:
      - assistive_net
    # GPU passthrough for Ollama (Phase 4+)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

# ----------------------------------------------------------
# Named volumes & networks
# ----------------------------------------------------------
volumes:
  ollama_data:
    driver: local

networks:
  assistive_net:
    driver: bridge
