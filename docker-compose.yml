version: '3.8'

services:
  app:
    build: .
    container_name: sam-vision-app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - MODEL_DEVICE=auto
      - MOCK_STT=false
      - MOCK_SAM=false
      - MOCK_BLIP=false
      - MOCK_OLLAMA=false
      - MOCK_TTS=false
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - OCR_BACKEND=ollama_vision
      - OCR_MODEL=glm-ocr:latest
      - OLLAMA_NUM_CTX=512
      - STT_MODEL=small
      - STT_COMPUTE_TYPE=auto
      - STT_MAX_AUDIO_SECONDS=8
      - MAX_FRAME_SIZE=640
      - MAX_WS_FRAME_BYTES=10485760
      - SAM_MAX_CROPS=3
      - BLIP_MAX_CAPTIONS=3
      - BLIP_MAX_NEW_TOKENS=32
      - OLLAMA_NUM_PREDICT=80
      - TTS_STREAMING=true
    # Enable NVIDIA GPU support
    # Note: Requires NVIDIA Container Toolkit installed on the host machine
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Restart policy
    restart: unless-stopped
    # Use polling for fast-api auto-reload if needed on Windows
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
